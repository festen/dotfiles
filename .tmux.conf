# Rebind C-b to C-a
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Enable scrollback
# set -g terminal-overrides 'xterm*:smcup@:rmcup@'
set -g mouse on

# Set windows and pane to start at index 1
set -g base-index 1
setw -g pane-base-index 1

### BINDINGS

# Open new pane in current dir
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Set reload key to r
bind r source-file ~/.tmux.conf \; display-message " Config reloaded..."

# Switch tabs (-n: no prior escape seq)
unbind -n C-]
bind -n C-] last-pane

### STATUS BAR
set -g status-bg default
set -g status-fg white
set -g status-interval 5
set -g status-left-length 120
set -g status-right-length 60
set -g status-left "#[fg=Green]#(whoami)@#(hostname -s) #[fg=yellow]#(curl ipecho.net/plain;echo) #[fg=Cyan]#S "
set -g status-justify left
set -g status-right '#[fg=white]%a %d %b %R'

